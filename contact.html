<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Get in touch with Jake Keleher — developer and designer." />
  <title>Contact — Jake Keleher</title>
  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="scroll-progress" role="progressbar" aria-label="Scroll progress">
    <div class="scroll-progress__bar"></div>
  </div>
  <header class="site-header">
    <a href="index.html" class="logo">JakeKeleher.dev</a>
    <nav class="nav" aria-label="Main">
      <a href="index.html#about">About</a>
      <a href="experience.html">Experience</a>
      <a href="project.html">Projects</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <section class="section contact-page">
      

      <div class="contact-grid">
        <div class="contact-left">
          <h1 class="section-title">Contact</h1>
          <p class="contact-text">Open to work and collaboration. Say hi!</p>
        
          <div class="contact-links-block">
            <h2 class="contact-heading">Find me</h2>
            <ul class="contact-links">
              <li><a href="mailto:jakepk7@gmail.com">Email</a></li>
              <li><a href="https://github.com/JakeKeleherGit" target="_blank" rel="noopener noreferrer">GitHub</a></li>
              <li><a href="https://www.linkedin.com/in/jake-keleher-88a0b2271/" target="_blank" rel="noopener noreferrer">LinkedIn</a></li>
            </ul>
          </div>
        </div>

        <div class="contact-form-block">
          <h2 class="contact-heading">Send a message</h2>
        
          <form
            id="contact-form"
            class="contact-form"
            action="https://formspree.io/f/xpqkjlzq"
            method="POST"
            aria-label="Contact form"
          >
            <label for="contact-name">Name</label>
            <input type="text" id="contact-name" name="name" required autocomplete="name" />
        
            <label for="contact-email">Email</label>
            <input type="email" id="contact-email" name="email" required autocomplete="email" />
        
            <label for="contact-message">Message</label>
            <textarea id="contact-message" name="message" rows="5" required></textarea>
        
            <input type="hidden" name="_subject" value="New portfolio contact form message" />
            <input type="hidden" name="_replyto" value="" />
        
            <button type="submit" class="btn btn-primary">Send message</button>
          </form>
        
          <p class="contact-form-note" id="form-status"></p>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>© <span id="year"></span> Jake Keleher.</p>
  </footer>

  <script src="js/main.js"></script>
  <script>
    const form = document.getElementById("contact-form");
    const status = document.getElementById("form-status");
    const emailInput = document.getElementById("contact-email");
  
    form.addEventListener("submit", async function (event) {
      event.preventDefault();
  
      status.textContent = "Sending...";
      form.querySelector('input[name="_replyto"]').value = emailInput.value;
  
      const data = new FormData(form);
  
      try {
        const response = await fetch(form.action, {
          method: form.method,
          body: data,
          headers: {
            Accept: "application/json"
          }
        });
  
        if (response.ok) {
          status.textContent = "Thanks — your message was sent.";
          form.reset();
        } else {
          status.textContent = "Something went wrong. Please try again.";
        }
      } catch (error) {
        status.textContent = "Something went wrong. Please try again.";
      }
    });
  </script>
  <script src="js/main.js"></script>
</body>
</html>
